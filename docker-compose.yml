version: '3.8'

services:
  # Consul service for service discovery
  consul:
    image: consul:1.15
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    environment:
      - CONSUL_BIND_INTERFACE=eth0
      - CONSUL_CLIENT_INTERFACE=eth0
    restart: always
    healthcheck:
      test: ["CMD", "consul", "members", "-http-addr", "http://localhost:8500"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nacos service for configuration center
  nacos:
    image: nacos/nacos-server:v2.2.3
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=false
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ZooKeeper service (Kafka dependency)
  zookeeper:
    image: bitnami/zookeeper:3.8
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    restart: always
    volumes:
      - zookeeper-data:/bitnami/zookeeper

  # Kafka service
  kafka:
    image: bitnami/kafka:3.3
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_NUM_PARTITIONS=3
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=1
    depends_on:
      - zookeeper
    restart: always
    volumes:
      - kafka-data:/bitnami/kafka

  # Redis cache service
  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MySQL database service
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=mixmlaal
      - MYSQL_USER=mixmlaal
      - MYSQL_PASSWORD=mixmlaal
    volumes:
      - mysql-data:/var/lib/mysql
      - mysql-config:/etc/mysql/conf.d
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MQTT broker for 5G communication
  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: always
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "health", "-h", "localhost", "-C", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Istio components
  istio-pilot:
    image: istio/pilot:1.18.0
    ports:
      - "15010:15010"
      - "15011:15011"
      - "15012:15012"
    environment:
      - PILOT_TRACE_SAMPLING=100
      - ISTIO_META_HTTP10=1
    restart: always
    depends_on:
      - consul

  istio-proxy:
    image: istio/proxyv2:1.18.0
    ports:
      - "15000:15000"
      - "15001:15001"
      - "15006:15006"
    restart: always
    depends_on:
      - istio-pilot

  # User service
  user-service:
    build:
      context: ./apps/services/user-service
      dockerfile: Dockerfile
