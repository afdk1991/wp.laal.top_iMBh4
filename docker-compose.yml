      dockerfile: Dockerfile
    ports:
      - "3017:3017"
    environment:
      - NODE_ENV=development
      - SUPPLY_CHAIN_PORT=3017
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_HOST=kafka
      - KAFKA_PORT=9092
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - SERVICE_HOST=supply-chain
      - NACOS_HOST=nacos
      - NACOS_PORT=8848
      - NACOS_NAMESPACE=mixmlaal
      - NACOS_GROUP=DEFAULT_GROUP
      - ISTIO_PROXY_HOST=istio-proxy
      - ISTIO_PROXY_PORT=15006
    depends_on:
      - consul
      - nacos
      - redis
      - kafka
      - istio-proxy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3017/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Operation platform service
  operation-platform:
    build:
      context: ./apps/services/operation-platform
      dockerfile: Dockerfile
    ports:
      - "3018:3018"
    environment:
      - NODE_ENV=development
      - OPERATION_PLATFORM_PORT=3018
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_HOST=kafka
      - KAFKA_PORT=9092
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=mixmlaal
      - MYSQL_USER=mixmlaal
      - MYSQL_PASSWORD=mixmlaal
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - SERVICE_HOST=operation-platform
      - NACOS_HOST=nacos
      - NACOS_PORT=8848
      - NACOS_NAMESPACE=mixmlaal
      - NACOS_GROUP=DEFAULT_GROUP
      - ISTIO_PROXY_HOST=istio-proxy
      - ISTIO_PROXY_PORT=15006
    depends_on:
      - consul
      - nacos
      - redis
      - kafka
      - mysql
      - istio-proxy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3018/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Customer service system
  customer-service:
    build:
      context: ./apps/services/customer-service
      dockerfile: Dockerfile
    ports:
      - "3019:3019"
    environment:
      - NODE_ENV=development
      - CUSTOMER_SERVICE_PORT=3019
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_HOST=kafka
      - KAFKA_PORT=9092
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=mixmlaal
      - MYSQL_USER=mixmlaal
      - MYSQL_PASSWORD=mixmlaal
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - SERVICE_HOST=customer-service
      - NACOS_HOST=nacos
      - NACOS_PORT=8848
      - NACOS_NAMESPACE=mixmlaal
      - NACOS_GROUP=DEFAULT_GROUP
      - ISTIO_PROXY_HOST=istio-proxy
      - ISTIO_PROXY_PORT=15006
    depends_on:
      - consul
      - nacos
      - redis
      - kafka
      - mysql
      - istio-proxy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3019/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API gateway
  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    ports:
      - "80:3000"
      - "9091:9091"  # Prometheus metrics
    environment:
      - NODE_ENV=development
      - API_GATEWAY_PORT=3000
      - USER_SERVICE_URL=http://user-service:3001
      - RIDE_SERVICE_URL=http://ride-service:3002
      - ECOMMERCE_SERVICE_URL=http://ecommerce-service:3003
      - PAYMENT_SERVICE_URL=http://payment-service:3004
      - ORDER_SERVICE_URL=http://order-service:3005
      - SOCIAL_SERVICE_URL=http://social-service:3006
      - PORTAL_SERVICE_URL=http://portal-service:3007
      - FOOD_SERVICE_URL=http://food-service:3009
      - ERRAND_SERVICE_URL=http://errand-service:3010
      - COMMON_SERVICE_URL=http://common-service:3008
      - TRANSACTION_SERVICE_URL=http://transaction-service:3011
      - BLOCKCHAIN_SERVICE_URL=http://blockchain-service:3012
      - FIVE_G_SERVICE_URL=http://5g-service:3013
      - EDGE_SERVICE_URL=http://edge-service:3014
      - CACHE_SERVICE_URL=http://cache-service:3015
      - SMART_TRAFFIC_URL=http://smart-traffic:3016
      - SUPPLY_CHAIN_URL=http://supply-chain:3017
      - OPERATION_PLATFORM_URL=http://operation-platform:3018
      - CUSTOMER_SERVICE_URL=http://customer-service:3019
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - NACOS_HOST=nacos
      - NACOS_PORT=8848
      - NACOS_NAMESPACE=mixmlaal
      - NACOS_GROUP=DEFAULT_GROUP
      - METRICS_PORT=9091
      - ISTIO_PROXY_HOST=istio-proxy
      - ISTIO_PROXY_PORT=15006
    depends_on:
      - consul
      - user-service
      - ride-service
      - ecommerce-service
      - payment-service
      - order-service
      - social-service
      - portal-service
      - food-service
      - errand-service
      - common-service
      - transaction-service
      - blockchain-service
      - 5g-service
      - edge-service
      - cache-service
      - smart-traffic
      - supply-chain
      - operation-platform
      - customer-service
      - istio-proxy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus service for monitoring
  prometheus:
    image: prom/prometheus:v2.45.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    restart: always
    depends_on:
      - api-gateway

  # Grafana service for visualization
  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    restart: always
    depends_on:
      - prometheus

volumes:
  zookeeper-data:
  kafka-data:
  redis-data:
  mysql-data:
  mysql-config:
  prometheus-data:
  grafana-data: