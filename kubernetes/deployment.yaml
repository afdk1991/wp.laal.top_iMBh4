apiVersion: apps/v1
kind: Deployment
metadata:
  name: mixmlaal-api
  namespace: mixmlaal
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mixmlaal-api
  template:
    metadata:
      labels:
        app: mixmlaal-api
    spec:
      containers:
      - name: mixmlaal-api
        image: mixmlaal/api:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        env:
        - name: NODE_ENV
          value: "production"
        - name: DB_HOST
          value: "mysql"
        - name: DB_PORT
          value: "3306"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
        - name: REDIS_HOST
          value: "redis"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secret
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mixmlaal-frontend
  namespace: mixmlaal
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mixmlaal-frontend
  template:
    metadata:
      labels:
        app: mixmlaal-frontend
    spec:
      containers:
      - name: mixmlaal-frontend
        image: mixmlaal/frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: mixmlaal-api
  namespace: mixmlaal
spec:
  selector:
    app: mixmlaal-api
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: mixmlaal-frontend
  namespace: mixmlaal
spec:
  selector:
    app: mixmlaal-frontend
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mixmlaal-api-hpa
  namespace: mixmlaal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mixmlaal-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mixmlaal-frontend-hpa
  namespace: mixmlaal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mixmlaal-frontend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
