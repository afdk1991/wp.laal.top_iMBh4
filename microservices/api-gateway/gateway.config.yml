    url: 'http://notification-service:3005'
  shopService:
    url: 'http://shop-service:3006'
  couponService:
    url: 'http://coupon-service:3007'
  integratedService:
    url: 'http://integrated-service:3008'
  housekeepingService:
    url: 'http://housekeeping-service:3005'
  educationService:
    url: 'http://education-service:3006'
