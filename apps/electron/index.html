<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIXMLAAL</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }
    .btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 12px 24px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
      margin: 10px;
    }
    .btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }
    .loading {
      margin-top: 30px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MIXMLAAL</h1>
    <p>全球卓越的一站式多元化出行+本地生活生态平台</p>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在加载应用...</p>
    </div>
    <div id="content" style="display: none;">
      <button class="btn" onclick="loadWebApp()">打开Web应用</button>
      <button class="btn" onclick="checkUpdates()">检查更新</button>
      <button class="btn" onclick="openSettings()">设置</button>
    </div>
  </div>
  
  <script>
    const { ipcRenderer } = require('electron');
    
    // 加载完成后显示内容
    window.onload = function() {
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      }, 2000);
    };
    
    // 加载Web应用
    function loadWebApp() {
      window.location.href = 'http://localhost:3000';
    }
    
    // 检查更新
    function checkUpdates() {
      ipcRenderer.send('check-updates');
    }
    
    // 打开设置
    function openSettings() {
      alert('设置功能开发中...');
    }
    
    // 接收主进程消息
    ipcRenderer.on('update-available', () => {
      if (confirm('发现新版本，是否立即更新？')) {
        ipcRenderer.send('download-update');
      }
    });
    
    ipcRenderer.on('update-not-available', () => {
      alert('当前版本已是最新');
    });
    
    ipcRenderer.on('update-error', (event, error) => {
      alert('检查更新时发生错误: ' + error);
    });
  </script>
</body>
</html>
