version: '3.8'

services:
  jaeger:
    image: jaegertracing/all-in-one:1.48
    container_name: jaeger
    ports:
      - "6831:6831/udp"
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    environment:
      - SPAN_STORAGE_TYPE=elasticsearch
      - ES_SERVER_URLS=http://elasticsearch:9200
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - LOG_LEVEL=info
      - QUERY_BASE_PATH=/jaeger
    restart: always
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:16686/"]
      interval: 30s
      timeout: 10s
      retries: 3

  jaeger-agent:
    image: jaegertracing/jaeger-agent:1.48
    container_name: jaeger-agent
    ports:
      - "5775:5775/udp"
      - "5778:5778"
      - "6832:6832/udp"
      - "35000:35000"
    command: ["--reporter.grpc.host-port=jaeger:14250"]
    environment:
      - LOG_LEVEL=info
    restart: always
    depends_on:
      - jaeger