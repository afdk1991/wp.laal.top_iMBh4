global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

rule_files:
  - "alert.rules.yml"

scrape_configs:
  # API服务监控
  - job_name: 'api-service'
    static_configs:
      - targets: ['localhost:3000']

  # 微服务监控
  - job_name: 'auth-service'
    static_configs:
      - targets: ['localhost:3001', 'localhost:3002']

  - job_name: 'user-service'
    static_configs:
      - targets: ['localhost:3003', 'localhost:3004']

  - job_name: 'order-service'
    static_configs:
      - targets: ['localhost:3005', 'localhost:3006']

  - job_name: 'product-service'
    static_configs:
      - targets: ['localhost:3007', 'localhost:3008']

  - job_name: 'payment-service'
    static_configs:
      - targets: ['localhost:3009', 'localhost:3010']

  # 数据库监控
  - job_name: 'mysql-exporter'
    static_configs:
      - targets: ['localhost:9104']

  # Redis监控
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['localhost:9121']

  # 系统监控
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
