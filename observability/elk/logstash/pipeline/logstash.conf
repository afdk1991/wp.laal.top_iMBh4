input {
  beats {
    port => 5044
    codec => json
  }

  tcp {
    port => 5000
    codec => json
  }

  http {
    port => 8080
    codec => json
  }
}

filter {
  if [service] {
    mutate {
      add_field => { "[@metadata][service]" => "%{service}" }
    }
  }

  if [level] {
    mutate {
      add_field => { "[@metadata][level]" => "%{level}" }
    }
  }

  date {
    match => [ "timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS" ]
    target => "@timestamp"
  }

  mutate {
    remove_field => [ "timestamp" ]
  }

  if [message] =~ /^\d{4}-\d{2}-\d{2}/ {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp}\s*%{LOGLEVEL:level}\s*%{GREEDYDATA:log_message}" }
    }
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }

  if [context] {
    json {
      source => "context"
      target => "context_parsed"
    }
  }

  if [stack_trace] {
    mutate {
      add_field => { "error_type" => "exception" }
    }
  }

  mutate {
    add_field => {
      "environment" => "${ENVIRONMENT:production}"
      "cluster" => "${CLUSTER:mixmlaal-cluster}"
    }
  }

  if [service] == "user-service" or [service] == "ride-service" or [service] == "ecommerce-service" {
    mutate {
      add_tag => [ "business-service" ]
    }
  }

  if [service] == "api-gateway" or [service] == "edge-service" {
    mutate {
      add_tag => [ "gateway" ]
    }
  }

  if [service] == "ai-service" or [service] == "i18n-service" {
    mutate {
      add_tag => [ "intelligence-service" ]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "mixmlaal-%{[@metadata][service]}-%{+YYYY.MM.dd}"
    document_type => "_doc"
    action => "index"
    codec => json
  }

  if "business-service" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "mixmlaal-business-%{+YYYY.MM.dd}"
      document_type => "_doc"
    }
  }

  if "gateway" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "mixmlaal-gateway-%{+YYYY.MM.dd}"
      document_type => "_doc"
    }
  }

  if "error" in [level] or [error_type] == "exception" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "mixmlaal-errors-%{+YYYY.MM.dd}"
      document_type => "_doc"
    }
  }

  stdout {
    codec => rubydebug
  }
}