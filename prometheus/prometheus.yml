# Prometheus配置文件
# 版本: v2.45.0

# 全局配置
global:
  scrape_interval: 15s  # 抓取间隔
  evaluation_interval: 15s  # 评估间隔
  # 外部标签
  external_labels:
    monitor: 'mixmlaal-monitor'

# 告警配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# 规则文件
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# 抓取配置
scrape_configs:
  # API网关监控
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:9091']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # 服务监控
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:3001']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'ride-service'
    static_configs:
      - targets: ['ride-service:3002']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'ecommerce-service'
    static_configs:
      - targets: ['ecommerce-service:3003']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:3004']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:3005']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'social-service'
    static_configs:
      - targets: ['social-service:3006']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'portal-service'
    static_configs:
      - targets: ['portal-service:3007']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'food-service'
    static_configs:
      - targets: ['food-service:3009']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'errand-service'
    static_configs:
      - targets: ['errand-service:3010']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'common-service'
    static_configs:
      - targets: ['common-service:3008']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'transaction-service'
    static_configs:
      - targets: ['transaction-service:3011']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # 基础设施监控
  - job_name: 'consul'
    static_configs:
      - targets: ['consul:8500']
    metrics_path: '/v1/metrics'
    scrape_interval: 20s

  - job_name: 'nacos'
    static_configs:
      - targets: ['nacos:8848']
    metrics_path: '/nacos/v1/metrics'
    scrape_interval: 20s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: '/metrics'
    scrape_interval: 20s

  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql:9104']
    metrics_path: '/metrics'
    scrape_interval: 20s

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9308']
    metrics_path: '/metrics'
    scrape_interval: 20s