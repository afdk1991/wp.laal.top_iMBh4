# MIXMLAAL 告警规则
# 版本: v1.0.0.0

groups:
  # 系统告警组
  - name: system_alerts
    rules:
      # CPU 负载告警
      - alert: HighCPULoad
        expr: mixmlaal_system_cpu_load > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU 负载过高"
          description: "实例 {{ $labels.instance }} CPU 负载超过 80%，当前值: {{ $value }}%"

      - alert: CriticalCPULoad
        expr: mixmlaal_system_cpu_load > 90
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "CPU 负载严重过高"
          description: "实例 {{ $labels.instance }} CPU 负载超过 90%，当前值: {{ $value }}%"

      # 内存使用告警
      - alert: HighMemoryUsage
        expr: mixmlaal_system_memory_usage > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "内存使用率过高"
          description: "实例 {{ $labels.instance }} 内存使用率超过 85%，当前值: {{ $value }}%"

      - alert: CriticalMemoryUsage
        expr: mixmlaal_system_memory_usage > 95
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "内存使用率严重过高"
          description: "实例 {{ $labels.instance }} 内存使用率超过 95%，当前值: {{ $value }}%"

  # 应用告警组
  - name: application_alerts
    rules:
      # 响应时间告警
      - alert: HighResponseTime
        expr: mixmlaal_response_time_avg > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "平均响应时间过长"
          description: "实例 {{ $labels.instance }} 平均响应时间超过 500ms，当前值: {{ $value }}ms"

      - alert: CriticalResponseTime
        expr: mixmlaal_response_time_avg > 1000
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "平均响应时间严重过长"
          description: "实例 {{ $labels.instance }} 平均响应时间超过 1000ms，当前值: {{ $value }}ms"

      # 错误率告警
      - alert: HighErrorRate
        expr: (mixmlaal_requests_error / mixmlaal_requests_total) * 100 > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "错误率过高"
          description: "实例 {{ $labels.instance }} 错误率超过 5%，当前值: {{ $value | printf '%.2f' }}%"

      - alert: CriticalErrorRate
        expr: (mixmlaal_requests_error / mixmlaal_requests_total) * 100 > 10
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "错误率严重过高"
          description: "实例 {{ $labels.instance }} 错误率超过 10%，当前值: {{ $value | printf '%.2f' }}%"

      # 请求量告警
      - alert: HighRequestRate
        expr: rate(mixmlaal_requests_total[5m]) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "请求量过高"
          description: "实例 {{ $labels.instance }} 请求率超过 1000 请求/分钟，当前值: {{ $value | printf '%.0f' }} 请求/分钟"

  # 端点告警组
  - name: endpoint_alerts
    rules:
      # 慢端点告警
      - alert: SlowEndpoint
        expr: mixmlaal_response_time_avg > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "端点响应时间过长"
          description: "端点 {{ $labels.instance }} 平均响应时间超过 500ms，当前值: {{ $value }}ms"
