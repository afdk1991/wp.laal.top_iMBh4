# ============================================
# MIXMLAAL CI/CD 工作流
# 版本: v1.0.0.0
# 说明: 自动化构建、测试、安全扫描与部署
# ============================================

name: MIXMLAAL CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 版本号生成
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      full_version: ${{ steps.version.outputs.full_version }}
      build: ${{ steps.version.outputs.build }}
      timestamp: ${{ steps.version.outputs.timestamp }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Generate version
        id: version
        run: |
          cd mixmlaal-app
          python version_manager.py
          echo "version=$(cat build_version.json | jq -r '.version')" >> $GITHUB_OUTPUT
          echo "full_version=$(cat build_version.json | jq -r '.fullVersion')" >> $GITHUB_OUTPUT
          echo "build=$(cat build_version.json | jq -r '.build')" >> $GITHUB_OUTPUT
          echo "timestamp=$(cat build_version.json | jq -r '.timestamp')" >> $GITHUB_OUTPUT
          echo "Generated version: ${{ steps.version.outputs.version }}"

      - name: Upload version info
        uses: actions/upload-artifact@v4
        with:
          name: version-info
          path: mixmlaal-app/build_version.json
          retention-days: 30

  # 代码质量检查
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # 依赖安全检查
  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  # 单元测试
  test-unit:
    runs-on: ubuntu-latest
    needs: [version]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download version info
        uses: actions/download-artifact@v4
        with:
          name: version-info
          path: mixmlaal-app

      - name: Run unit tests
        run: npm run test:unit -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # 集成测试
  test-integration:
    runs-on: ubuntu-latest
    needs: [version]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test123
          MYSQL_DATABASE: mixmlaal_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=3s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download version info
        uses: actions/download-artifact@v4
        with:
          name: version-info
          path: mixmlaal-app

      - name: Setup database schema
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -ptest123 mixmlaal_test < scripts/database/schema.sql

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: mixmlaal_test
          DB_USER: root
          DB_PASSWORD: test123
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          JWT_SECRET: test-secret-key-min-32-characters-long

  # E2E测试
  test-e2e:
    runs-on: ubuntu-latest
    needs: [version]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download version info
        uses: actions/download-artifact@v4
        with:
          name: version-info
          path: mixmlaal-app

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Build application
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # 构建Docker镜像
  build:
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, version]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download version info
        uses: actions/download-artifact@v4
        with:
          name: version-info
          path: mixmlaal-app

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.version.outputs.build }},enable=true

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 安全扫描
  security-scan:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy in table format
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

  # 构建Capacitor应用
  build-mobile:
    runs-on: ubuntu-latest
    needs: [version]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download version info
        uses: actions/download-artifact@v4
        with:
          name: version-info
          path: mixmlaal-app

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync

      - name: Upload Android build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: android/
          retention-days: 7

      - name: Upload iOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ios/
          retention-days: 7

  # 部署到测试环境
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build, security-scan, version]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.laal.top

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download version info
        uses: actions/download-artifact@v4
        with:
          name: version-info
          path: mixmlaal-app

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "Version: ${{ needs.version.outputs.version }}"
          echo "Build: ${{ needs.version.outputs.build }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop"
          ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }} " \
            cd ${{ secrets.STAGING_SERVER_PATH }} && \
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop && \
            docker-compose up -d && \
            docker system prune -f \
          "

      - name: Verify deployment
        run: |
          echo "Verifying staging deployment..."
          curl -s -o /dev/null -w "%{http_code}" https://staging.laal.top/api/v1/health | grep -q "200"
          if [ $? -eq 0 ]; then
            echo "Staging deployment successful!"
          else
            echo "Staging deployment failed!"
            exit 1
          fi

  # 部署到生产环境
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build, security-scan, test-e2e, version]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://laal.top

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download version info
        uses: actions/download-artifact@v4
        with:
          name: version-info
          path: mixmlaal-app

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          echo "Version: ${{ needs.version.outputs.version }}"
          echo "Build: ${{ needs.version.outputs.build }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_SERVER_USER }}@${{ secrets.PRODUCTION_SERVER_HOST }} " \
            cd ${{ secrets.PRODUCTION_SERVER_PATH }} && \
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest && \
            docker-compose up -d && \
            docker system prune -f \
          "

      - name: Verify deployment
        run: |
          echo "Verifying production deployment..."
          curl -s -o /dev/null -w "%{http_code}" https://laal.top/api/v1/health | grep -q "200"
          if [ $? -eq 0 ]; then
            echo "Production deployment successful!"
          else
            echo "Production deployment failed!"
            exit 1
          fi

  # 发布Release
  release:
    runs-on: ubuntu-latest
    needs: [build, security-scan, version]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download version info
        uses: actions/download-artifact@v4
        with:
          name: version-info
          path: mixmlaal-app

      - name: Generate changelog
        id: changelog
        uses: metcalfc/changelog-generator@v4.3.1
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHOX_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }} (v${{ needs.version.outputs.version }})
          body: |
            ## Version: ${{ needs.version.outputs.version }}
            ## Build: ${{ needs.version.outputs.build }}
            ## Full Version: ${{ needs.version.outputs.full_version }}

            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}

  # 通知
  notify:
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production, release]
    if: always()
    steps:
      - name: Notify on success
        if: needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success' || needs.release.result == 'success'
        run: |
          echo "Deployment successful!"
          if [ -n "${{ secrets.SLACK_WEBHOOK }}" ]; then
            curl -X POST -H "Content-type: application/json" --data '{"text":"🚀 MIXMLAAL deployment successful!"}' ${{ secrets.SLACK_WEBHOOK }}
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed!"
          if [ -n "${{ secrets.SLACK_WEBHOOK }}" ]; then
            curl -X POST -H "Content-type: application/json" --data '{"text":"❌ MIXMLAAL deployment failed!"}' ${{ secrets.SLACK_WEBHOOK }}
          fi
