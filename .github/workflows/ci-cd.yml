name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build frontend
        run: npm run build:frontend
      
      - name: Build API
        run: npm run build:api
      
      - name: Run tests
        run: npm test
      
      - name: Security scan
        run: npm run security-scan
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            apps/api/build/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker images
        run: |
          docker build -t mixmlaal/api:latest -f apps/api/Dockerfile .
          docker build -t mixmlaal/frontend:latest -f apps/frontend/Dockerfile .
          docker push mixmlaal/api:latest
          docker push mixmlaal/frontend:latest
      
      - name: Deploy to Kubernetes
        run: |
          kubectl config use-context mixmlaal-prod
          kubectl apply -f k8s/api-deployment.yml
          kubectl apply -f k8s/frontend-deployment.yml
          kubectl rollout status deployment/api
          kubectl rollout status deployment/frontend
      
      - name: Send deployment notification
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d '{"text":"Deployment completed successfully!"}'