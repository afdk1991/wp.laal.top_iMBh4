name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build frontend
      run: npm run build:frontend
    
    - name: Build API
      run: npm run build:api
    
    - name: Run tests
      run: npm test
    
    - name: Build Docker images
      run: |
        docker build -t mixmlaal/frontend:${{ github.sha }} -f Dockerfile.frontend .
        docker build -t mixmlaal/api:${{ github.sha }} -f Dockerfile.api .
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    
    - name: Push Docker images
      run: |
        docker push mixmlaal/frontend:${{ github.sha }}
        docker push mixmlaal/api:${{ github.sha }}
    
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.24.0'
    
    - name: Configure Kubernetes context
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
    
    - name: Update Kubernetes deployment
      run: |
        kubectl set image deployment/mixmlaal-frontend mixmlaal-frontend=mixmlaal/frontend:${{ github.sha }} -n mixmlaal
        kubectl set image deployment/mixmlaal-api mixmlaal-api=mixmlaal/api:${{ github.sha }} -n mixmlaal
    
    - name: Verify deployment
      run: |
        kubectl rollout status deployment/mixmlaal-frontend -n mixmlaal
        kubectl rollout status deployment/mixmlaal-api -n mixmlaal
