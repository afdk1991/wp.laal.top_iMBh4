<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MIXMLAAL</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.5;
      font-size: 14px;
    }
    
    .container {
      max-width: 320px;
      margin: 0 auto;
      background: white;
      min-height: 480px;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: bold;
    }
    
    .nav {
      background: #f8f8f8;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-around;
    }
    
    .nav-item {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-bottom: 2px solid transparent;
      cursor: pointer;
    }
    
    .nav-item.active {
      border-bottom-color: #667eea;
      color: #667eea;
      font-weight: bold;
    }
    
    .content {
      padding: 15px;
    }
    
    .menu {
      list-style: none;
    }
    
    .menu-item {
      padding: 15px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    
    .menu-item:hover {
      background: #f8f8f8;
    }
    
    .menu-item .icon {
      width: 24px;
      height: 24px;
      background: #667eea;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
    }
    
    .footer {
      background: #f8f8f8;
      padding: 10px;
      text-align: center;
      border-top: 1px solid #e0e0e0;
      font-size: 12px;
      color: #666;
    }
    
    .loading {
      text-align: center;
      padding: 20px;
    }
    
    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* 适配功能机键盘导航 */
    .menu-item:focus {
      outline: 2px solid #667eea;
      background: #f0f0f0;
    }
    
    /* 响应式设计 */
    @media screen and (max-width: 320px) {
      .container {
        max-width: 100%;
      }
      
      .header h1 {
        font-size: 16px;
      }
      
      .menu-item {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>MIXMLAAL</h1>
    </div>
    
    <div class="nav">
      <div class="nav-item active" id="nav-home">首页</div>
      <div class="nav-item" id="nav-services">服务</div>
      <div class="nav-item" id="nav-me">我的</div>
    </div>
    
    <div class="content">
      <div id="home-content">
        <ul class="menu">
          <li class="menu-item" tabindex="0" onclick="openService('ride')">
            <span>网约车</span>
            <span class="icon">🚗</span>
          </li>
          <li class="menu-item" tabindex="0" onclick="openService('food')">
            <span>外卖</span>
            <span class="icon">🍔</span>
          </li>
          <li class="menu-item" tabindex="0" onclick="openService('errand')">
            <span>跑腿</span>
            <span class="icon">🏃</span>
          </li>
          <li class="menu-item" tabindex="0" onclick="openService('mall')">
            <span>商城</span>
            <span class="icon">🛍️</span>
          </li>
          <li class="menu-item" tabindex="0" onclick="openService('social')">
            <span>社交</span>
            <span class="icon">👥</span>
          </li>
          <li class="menu-item" tabindex="0" onclick="openService('wallet')">
            <span>钱包</span>
            <span class="icon">💳</span>
          </li>
        </ul>
      </div>
      
      <div id="services-content" style="display: none;">
        <h3>服务列表</h3>
        <ul class="menu">
          <li class="menu-item" tabindex="0">网约车服务</li>
          <li class="menu-item" tabindex="0">外卖服务</li>
          <li class="menu-item" tabindex="0">跑腿服务</li>
          <li class="menu-item" tabindex="0">商城服务</li>
          <li class="menu-item" tabindex="0">社交服务</li>
        </ul>
      </div>
      
      <div id="me-content" style="display: none;">
        <h3>个人中心</h3>
        <ul class="menu">
          <li class="menu-item" tabindex="0">我的订单</li>
          <li class="menu-item" tabindex="0">我的优惠券</li>
          <li class="menu-item" tabindex="0">个人资料</li>
          <li class="menu-item" tabindex="0">设置</li>
          <li class="menu-item" tabindex="0">关于我们</li>
        </ul>
      </div>
    </div>
    
    <div class="footer">
      <p>© 2026 MIXMLAAL</p>
    </div>
  </div>
  
  <script>
    // 导航切换
    document.getElementById('nav-home').addEventListener('click', function() {
      showContent('home-content');
      setActiveNav('nav-home');
    });
    
    document.getElementById('nav-services').addEventListener('click', function() {
      showContent('services-content');
      setActiveNav('nav-services');
    });
    
    document.getElementById('nav-me').addEventListener('click', function() {
      showContent('me-content');
      setActiveNav('nav-me');
    });
    
    function showContent(contentId) {
      // 隐藏所有内容
      document.getElementById('home-content').style.display = 'none';
      document.getElementById('services-content').style.display = 'none';
      document.getElementById('me-content').style.display = 'none';
      
      // 显示选中的内容
      document.getElementById(contentId).style.display = 'block';
    }
    
    function setActiveNav(navId) {
      // 移除所有导航的活动状态
      const navItems = document.querySelectorAll('.nav-item');
      navItems.forEach(item => {
        item.classList.remove('active');
      });
      
      // 设置当前导航为活动状态
      document.getElementById(navId).classList.add('active');
    }
    
    // 打开服务
    function openService(service) {
      alert(`${service}服务开发中...`);
    }
    
    // 键盘导航支持
    document.addEventListener('keydown', function(e) {
      const activeElement = document.activeElement;
      const menuItems = document.querySelectorAll('.menu-item');
      const currentIndex = Array.from(menuItems).indexOf(activeElement);
      
      switch(e.key) {
        case 'ArrowUp':
          e.preventDefault();
          if (currentIndex > 0) {
            menuItems[currentIndex - 1].focus();
          } else {
            menuItems[menuItems.length - 1].focus();
          }
          break;
        case 'ArrowDown':
          e.preventDefault();
          if (currentIndex < menuItems.length - 1) {
            menuItems[currentIndex + 1].focus();
          } else {
            menuItems[0].focus();
          }
          break;
        case 'Enter':
          if (activeElement.classList.contains('menu-item')) {
            activeElement.click();
          }
          break;
      }
    });
    
    // 初始化
    window.onload = function() {
      // 设置第一个菜单项为焦点
      const firstMenuItem = document.querySelector('.menu-item');
      if (firstMenuItem) {
        firstMenuItem.focus();
      }
      
      // 检测KaiOS平台
      if (navigator.userAgent.includes('KaiOS')) {
        console.log('Running on KaiOS');
      }
    };
  </script>
</body>
</html>
